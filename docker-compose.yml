services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nbaexchange
      POSTGRES_PASSWORD: nbaexchange
      POSTGRES_DB: nbaexchange
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["./api"]
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    env_file:
      - .env

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    depends_on:
      - postgres
    env_file:
      - .env

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file:
      - .env

volumes:
  pgdata:
